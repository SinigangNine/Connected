<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Worship Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Worship Planner">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #1B2A4A;
      --gold:   #C9963A;
      --cream:  #FAF7F2;
      --mist:   #EEE9E0;
      --slate:  #4A5568;
      --white:  #FFFFFF;
      --red:    #C0392B;
      --radius: 12px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--navy); min-height: 100vh; }

    header { background: var(--navy); padding: 28px 24px 20px; text-align: center; }
    header::after { content: ''; display: block; width: 60px; height: 3px; background: var(--gold); margin: 12px auto 0; border-radius: 2px; }
    header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 5vw, 2.2rem); color: var(--white); }
    header p { color: #9aabcc; font-size: 0.85rem; margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
    .storage-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.12); color: #9aabcc; border-radius: 20px; padding: 3px 10px; font-size: 0.72rem; margin-top: 8px; }
    .storage-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; }

    /* Install banner */
    #installBanner { display: none; background: var(--gold); color: white; padding: 12px 16px; text-align: center; font-size: 0.88rem; font-weight: 600; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
    #installBanner.show { display: flex; }
    #installBanner button { background: white; color: var(--gold); border: none; border-radius: 20px; padding: 6px 14px; font-weight: 700; cursor: pointer; font-size: 0.82rem; }
    #installBanner .dismiss { background: transparent; color: rgba(255,255,255,0.7); font-size: 1.1rem; padding: 4px 8px; }

    /* Tabs */
    .tab-bar { display: flex; max-width: 760px; margin: 0 auto; padding: 0 16px; margin-top: 18px; gap: 8px; }
    .tab-btn {
      flex: 1; background: var(--white); border: 1.5px solid var(--mist); color: var(--slate);
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; padding: 12px 8px;
      border-radius: 10px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column;
      align-items: center; gap: 3px; text-align: center;
    }
    .tab-btn .tab-icon { font-size: 1.15rem; }
    .tab-btn.active { background: var(--navy); border-color: var(--navy); color: var(--white); box-shadow: 0 4px 12px rgba(27,42,74,0.25); }
    .tab-btn:not(.active):hover { border-color: var(--gold); color: var(--navy); }
    .tab-count {
      display: inline-block; min-width: 16px; padding: 0 4px; border-radius: 8px; font-size: 0.65rem;
      background: rgba(255,255,255,0.2); margin-top: 1px;
    }
    .tab-btn:not(.active) .tab-count { background: var(--mist); color: var(--slate); }

    main { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }

    .form-context {
      display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--slate);
      margin-bottom: 14px; padding: 8px 14px; background: var(--mist); border-radius: 8px;
    }
    .form-context strong { color: var(--navy); }
    .form-context .edit-flag { margin-left: auto; background: var(--gold); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }

    .section-card { background: var(--white); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(27,42,74,0.07); }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--navy); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--mist); display: flex; align-items: center; gap: 8px; }
    .section-title .icon { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.9rem; }

    .roles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-group label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--slate); }

    input[type="text"], input[type="date"] { width: 100%; padding: 10px 12px; border: 1.5px solid var(--mist); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.92rem; color: var(--navy); background: var(--cream); transition: border-color 0.2s; outline: none; }
    input[type="text"]:focus, input[type="date"]:focus { border-color: var(--gold); background: var(--white); }

    .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .info-row { grid-template-columns: 1fr; } }

    .song-form-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 12px; }
    @media (max-width: 500px) { .song-form-row { grid-template-columns: 1fr; } }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--gold); color: var(--white); }
    .btn-primary:hover { opacity: 0.88; }
    .btn-save { background: var(--navy); color: var(--white); width: 100%; padding: 14px; font-size: 0.95rem; margin-top: 4px; }
    .btn-save:hover { opacity: 0.88; }
    .btn-cancel { background: var(--mist); color: var(--slate); width: 100%; padding: 10px; font-size: 0.85rem; margin-top: 8px; }
    .btn-edit { background: var(--mist); color: var(--navy); }
    .btn-delete { background: #fdecea; color: var(--red); }
    .btn-export { background: #e8f5e9; color: #2e7d32; }
    .btn-print  { background: #e3f2fd; color: #1565c0; }
    .export-bar { display: flex; gap: 10px; margin-bottom: 6px; }

    #songList { list-style: none; margin-top: 4px; }
    #songList li { display: flex; align-items: center; gap: 10px; background: var(--cream); border: 1.5px solid var(--mist); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; cursor: grab; transition: box-shadow 0.15s; }
    #songList li:active { cursor: grabbing; }
    #songList li.sortable-chosen { box-shadow: 0 4px 14px rgba(201,150,58,0.25); }
    .drag-handle { color: #b0b8c8; font-size: 1rem; flex-shrink: 0; }
    .song-info { flex: 1; }
    .song-title-text { font-weight: 600; font-size: 0.92rem; }
    .song-meta { font-size: 0.75rem; color: var(--slate); margin-top: 2px; }
    .song-remove { background: none; border: none; color: #b0b8c8; font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; }
    .song-remove:hover { color: var(--red); }

    #output { margin-top: 8px; }
    .schedule-card { background: var(--white); border-radius: var(--radius); padding: 22px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(27,42,74,0.07); border-left: 4px solid var(--gold); }
    .schedule-card h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 10px; }
    .schedule-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .meta-chip { background: var(--cream); border: 1px solid var(--mist); border-radius: 20px; padding: 3px 10px; font-size: 0.78rem; color: var(--slate); }
    .meta-chip strong { color: var(--navy); }
    .roles-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .role-badge { background: #e8f0fe; color: #2a4fa8; border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; font-weight: 600; }
    .songs-ol { list-style: none; margin-bottom: 14px; }
    .songs-ol li { padding: 6px 0; border-bottom: 1px dashed var(--mist); font-size: 0.88rem; display: flex; align-items: center; gap: 8px; }
    .songs-ol li:last-child { border-bottom: none; }
    .song-num { background: var(--gold); color: var(--white); border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .song-link { background: none; border: none; padding: 0; font: inherit; color: var(--navy); cursor: pointer; text-align: left; text-decoration: none; border-bottom: 1px dashed var(--gold); transition: color 0.15s; }
    .song-link:hover { color: var(--gold); }
    .song-link .chords-hint { font-size: 0.68rem; color: #9aabcc; font-weight: 500; margin-left: 6px; text-decoration: none; }
    .card-actions { display: flex; gap: 8px; }

    .schedules-header { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--navy); margin: 28px 0 14px; display: flex; align-items: center; gap: 10px; }
    .schedules-header::after { content: ''; flex: 1; height: 1px; background: var(--mist); }

    .empty-state { text-align: center; padding: 32px 20px; color: #9aabcc; font-size: 0.9rem; }
    .empty-state .big { font-size: 2rem; margin-bottom: 8px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: var(--white); padding: 12px 22px; border-radius: 30px; font-size: 0.88rem; font-weight: 500; box-shadow: 0 6px 20px rgba(0,0,0,0.18); transition: transform 0.3s ease; z-index: 999; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    #loadingOverlay { position: fixed; inset: 0; background: var(--cream); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 12px; color: var(--slate); font-size: 0.9rem; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--mist); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print {
      body { background: white; }
      header { background: #1B2A4A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #installBanner, .tab-bar, .form-context, .section-card, #loadingOverlay, .export-bar,
      .card-actions, .btn-save, .btn-cancel, .toast, .storage-badge { display: none !important; }
      .schedule-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; margin-bottom: 20px; }
    }
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div>Loading schedules…</div>

<!-- Install App Banner -->
<div id="installBanner">
  📱 Install this app on your device for quick access!
  <button id="installBtn">Install App</button>
  <button class="dismiss" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
</div>

<header>
  <h1>🎵 Worship Planner</h1>
  <p>Schedule · Team · Setlist</p>
  <div class="storage-badge"><span class="dot"></span><span id="storageLabel">Connecting…</span></div>
</header>

<nav class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-service="sunday" onclick="switchTab('sunday')">
    <span class="tab-icon">⛪</span> Sunday Service <span class="tab-count" id="count-sunday">0</span>
  </button>
  <button class="tab-btn" data-service="youth" onclick="switchTab('youth')">
    <span class="tab-icon">🔥</span> Youth Service <span class="tab-count" id="count-youth">0</span>
  </button>
  <button class="tab-btn" data-service="midweek" onclick="switchTab('midweek')">
    <span class="tab-icon">📖</span> Midweek Service <span class="tab-count" id="count-midweek">0</span>
  </button>
</nav>

<main>
  <div class="form-context">
    Planning for: <strong id="formContextLabel">Sunday Service</strong>
    <span class="edit-flag" id="editFlag" style="display:none;">Editing</span>
  </div>

  <div class="section-card">
    <div class="section-title"><span class="icon">📅</span> Service Details</div>
    <div class="info-row">
      <div class="field-group"><label>Date</label><input type="date" id="date"></div>
      <div class="field-group"><label>Preacher</label><input type="text" id="preacher" placeholder="e.g. Pastor John"></div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title"><span class="icon">🎸</span> Team Roles</div>
    <div class="roles-grid">
      <div class="field-group"><label>Vocalist (Lead)</label><input type="text" id="vocalist" placeholder="Name"></div>
      <div class="field-group"><label>Back-up Singer 1</label><input type="text" id="backup1" placeholder="Name"></div>
      <div class="field-group"><label>Back-up Singer 2</label><input type="text" id="backup2" placeholder="Name"></div>
      <div class="field-group"><label>Acoustic Guitar</label><input type="text" id="guitarist" placeholder="Name"></div>
      <div class="field-group"><label>Electric Guitar</label><input type="text" id="electricGuitar" placeholder="Name"></div>
      <div class="field-group"><label>Bassist</label><input type="text" id="bassist" placeholder="Name"></div>
      <div class="field-group"><label>Keyboardist</label><input type="text" id="keyboardist" placeholder="Name"></div>
      <div class="field-group"><label>Drummer</label><input type="text" id="drummer" placeholder="Name"></div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title"><span class="icon">🎶</span> Setlist</div>
    <div class="song-form-row">
      <div class="field-group"><label>Song Title</label><input type="text" id="songTitle" placeholder="e.g. Way Maker"></div>
      <div class="field-group"><label>Key</label><input type="text" id="songKey" placeholder="e.g. G"></div>
    </div>
    <button class="btn btn-primary" onclick="addSong()">＋ Add Song</button>
    <ul id="songList" style="margin-top:16px;"></ul>
  </div>

  <button class="btn btn-save" onclick="saveSchedule()">💾 Save Schedule</button>
  <button class="btn btn-cancel" id="cancelEditBtn" style="display:none;" onclick="clearForm()">✕ Cancel Editing</button>

  <div class="schedules-header" id="schedulesHeader">Saved Sunday Schedules</div>
  <div class="export-bar">
    <button class="btn btn-print" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-export" onclick="exportJSON()">⬇️ Export Backup</button>
  </div>
  <div id="output"></div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ── PWA: Register Service Worker ──────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── PWA: Install prompt ───────────────────────────────────────────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById('installBanner').classList.remove('show');
      showToast('App installed! 🎉');
    }
    deferredPrompt = null;
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('show');
  });

  // ── Supabase ──────────────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://wrsbdzzztckxyxuxspzu.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indyc2Jkenp6dGNreHl4dXhzcHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTc4MTIsImV4cCI6MjA5NzA3MzgxMn0.agffd3LifwG-zkINTOYriozivRSl1nTEqKYYg3jLJXQ';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Service tab config ────────────────────────────────────────────────
  const SERVICE_LABELS = { sunday: 'Sunday Service', youth: 'Youth Service', midweek: 'Midweek Service' };
  let activeService = 'sunday';
  let allSchedules = []; // full cache of rows from db, each row.data.service_type tags which tab it belongs to

  // ── App state ─────────────────────────────────────────────────────────
  let songs = [];
  let editId = null;

  // ── Init ──────────────────────────────────────────────────────────────
  (async () => {
    await loadSchedules();
    document.getElementById('storageLabel').textContent = 'Live — shared with everyone';
    document.getElementById('loadingOverlay').style.display = 'none';
  })();

  // ── Tabs ──────────────────────────────────────────────────────────────
  function switchTab(service) {
    if (service === activeService) return;
    activeService = service;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.service === service);
    });
    document.getElementById('formContextLabel').textContent = SERVICE_LABELS[service];
    document.getElementById('schedulesHeader').textContent = `Saved ${SERVICE_LABELS[service]} Schedules`;
    clearForm();       // fresh form when switching services
    renderOutput();
  }

  // ── Drag & drop ───────────────────────────────────────────────────────
  new Sortable(document.getElementById('songList'), {
    animation: 150, handle: '.drag-handle', ghostClass: 'sortable-chosen',
    onEnd: syncSongsFromDOM
  });
  function syncSongsFromDOM() {
    const items = document.querySelectorAll('#songList li');
    const reordered = [];
    items.forEach(li => reordered.push(songs[parseInt(li.dataset.index)]));
    songs = reordered; renderSongs();
  }

  // ── Songs ─────────────────────────────────────────────────────────────
  function addSong() {
    const title = document.getElementById('songTitle').value.trim();
    const key   = document.getElementById('songKey').value.trim();
    if (!title) return;
    songs.push({ title, key });
    renderSongs();
    document.getElementById('songTitle').value = '';
    document.getElementById('songKey').value = '';
    document.getElementById('songTitle').focus();
  }
  document.getElementById('songTitle').addEventListener('keydown', e => { if (e.key === 'Enter') addSong(); });
  function removeSong(i) { songs.splice(i, 1); renderSongs(); }
  function renderSongs() {
    const list = document.getElementById('songList');
    list.innerHTML = '';
    songs.forEach((s, i) => {
      const li = document.createElement('li');
      li.dataset.index = i;
      li.innerHTML = `
        <span class="drag-handle">⠿</span>
        <div class="song-info">
          <div class="song-title-text">${s.title}</div>
          <div class="song-meta">${[s.key, s.tempo].filter(Boolean).join(' · ')}</div>
        </div>
        <button class="song-remove" onclick="removeSong(${i})">✕</button>`;
      list.appendChild(li);
    });
  }

  // ── Helpers ───────────────────────────────────────────────────────────
  const val = id => document.getElementById(id).value.trim();
  const set = (id, v) => document.getElementById(id).value = v || '';
  function clearForm() {
    ['date','preacher','vocalist','backup1','backup2','guitarist',
     'electricGuitar','bassist','keyboardist','drummer'].forEach(id => set(id, ''));
    songs = []; renderSongs(); editId = null;
    document.getElementById('editFlag').style.display = 'none';
    document.getElementById('cancelEditBtn').style.display = 'none';
  }

  // Opens a chord search for a song in a new tab. Escapes the title for safe use in HTML attributes.
  function searchChords(title) {
    const query = encodeURIComponent(`${title} chords`);
    window.open(`https://www.google.com/search?q=${query}`, '_blank', 'noopener');
  }
  function escapeHtml(str) {
    return (str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Save ──────────────────────────────────────────────────────────────
  async function saveSchedule() {
    const data = {
      service_type: activeService,
      date: val('date'), preacher: val('preacher'),
      roles: {
        vocalist: val('vocalist'), backup1: val('backup1'), backup2: val('backup2'),
        guitarist: val('guitarist'), electricGuitar: val('electricGuitar'),
        bassist: val('bassist'), keyboardist: val('keyboardist'), drummer: val('drummer')
      },
      songs: [...songs]
    };
    if (editId !== null) {
      const { error } = await db.from('schedules').update({ data }).eq('id', editId);
      if (error) { showToast('❌ ' + error.message); return; }
    } else {
      const { error } = await db.from('schedules').insert([{ data, created_at: new Date().toISOString() }]);
      if (error) { showToast('❌ ' + error.message); return; }
    }
    clearForm(); await loadSchedules(); showToast(`${SERVICE_LABELS[activeService]} schedule saved ✓`);
  }

  // ── Load ──────────────────────────────────────────────────────────────
  const roleLabels = {
    vocalist: 'Lead Vocalist', backup1: 'Back-up Singer 1', backup2: 'Back-up Singer 2',
    guitarist: 'Acoustic Guitar', electricGuitar: 'Electric Guitar',
    bassist: 'Bassist', keyboardist: 'Keyboardist', drummer: 'Drummer'
  };
  async function loadSchedules() {
    const { data: rows, error } = await db.from('schedules').select('*').order('created_at', { ascending: false });
    if (error) {
      document.getElementById('output').innerHTML = `<div class="empty-state"><div class="big">⚠️</div>${escapeHtml(error.message)}</div>`;
      return;
    }
    // Older rows saved before tabs existed default to "sunday" so nothing gets lost.
    allSchedules = (rows || []).map(row => {
      if (!row.data.service_type) row.data.service_type = 'sunday';
      return row;
    });
    updateTabCounts();
    renderOutput();
  }

  function updateTabCounts() {
    Object.keys(SERVICE_LABELS).forEach(svc => {
      const count = allSchedules.filter(r => r.data.service_type === svc).length;
      document.getElementById(`count-${svc}`).textContent = count;
    });
  }

  function renderOutput() {
    const output = document.getElementById('output');
    output.innerHTML = '';
    const rows = allSchedules.filter(r => r.data.service_type === activeService);
    if (!rows.length) {
      output.innerHTML = `<div class="empty-state"><div class="big">🎼</div>No ${SERVICE_LABELS[activeService]} schedules yet. Fill in the form above to get started.</div>`;
      return;
    }
    rows.forEach(row => {
      const s = row.data;
      const div = document.createElement('div');
      div.className = 'schedule-card';
      const rolesBadges = Object.entries(s.roles || {}).filter(([,v]) => v)
        .map(([k,v]) => `<span class="role-badge">${roleLabels[k]||k}: ${escapeHtml(v)}</span>`).join('');
      const songItems = (s.songs||[]).map((song,n) => `
        <li><span class="song-num">${n+1}</span>
        <span>
          <button class="song-link" onclick="searchChords('${escapeHtml(song.title).replace(/'/g,"\\'")}')" title="Search for chords online">${escapeHtml(song.title)}</button>
          ${song.key?' — '+escapeHtml(song.key):''}${song.tempo?', '+escapeHtml(song.tempo):''}
          <span class="chords-hint">🔍 chords</span>
        </span></li>`).join('');
      div.innerHTML = `
        <h3>📅 ${escapeHtml(s.date)||'No date'}</h3>
        <div class="schedule-meta">${s.preacher?`<span class="meta-chip"><strong>Preacher:</strong> ${escapeHtml(s.preacher)}</span>`:''}</div>
        <div class="roles-list">${rolesBadges||'<span style="color:#9aabcc;font-size:.8rem">No roles assigned</span>'}</div>
        ${songItems?`<ol class="songs-ol">${songItems}</ol>`:'<p style="font-size:.85rem;color:#9aabcc;margin-bottom:12px">No songs added</p>'}
        <div class="card-actions">
          <button class="btn btn-edit" onclick="editSchedule('${row.id}')">✏️ Edit</button>
          <button class="btn btn-delete" onclick="deleteSchedule('${row.id}')">🗑 Delete</button>
        </div>`;
      output.appendChild(div);
    });
  }

  async function deleteSchedule(id) {
    if (!confirm('Delete this schedule?')) return;
    const { error } = await db.from('schedules').delete().eq('id', id);
    if (error) { showToast('❌ ' + error.message); return; }
    await loadSchedules(); showToast('Schedule deleted');
  }

  async function editSchedule(id) {
    const row = allSchedules.find(r => String(r.id) === String(id));
    if (!row) return;
    const s = row.data;
    // Jump to the correct tab if the schedule being edited belongs to a different service.
    if (s.service_type && s.service_type !== activeService) {
      activeService = s.service_type;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.service === activeService);
      });
      document.getElementById('formContextLabel').textContent = SERVICE_LABELS[activeService];
      document.getElementById('schedulesHeader').textContent = `Saved ${SERVICE_LABELS[activeService]} Schedules`;
      renderOutput();
    }
    set('date',s.date); set('preacher',s.preacher);
    set('vocalist',s.roles.vocalist); set('backup1',s.roles.backup1);
    set('backup2',s.roles.backup2); set('guitarist',s.roles.guitarist);
    set('electricGuitar',s.roles.electricGuitar); set('bassist',s.roles.bassist);
    set('keyboardist',s.roles.keyboardist); set('drummer',s.roles.drummer);
    songs = [...s.songs]; renderSongs(); editId = id;
    document.getElementById('editFlag').style.display = 'inline-block';
    document.getElementById('cancelEditBtn').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showToast('Editing schedule — save when done');
  }

  async function exportJSON() {
    if (!allSchedules.length) { showToast('No schedules to export'); return; }
    const grouped = { sunday: [], youth: [], midweek: [] };
    allSchedules.forEach(r => {
      const svc = r.data.service_type || 'sunday';
      if (!grouped[svc]) grouped[svc] = [];
      grouped[svc].push(r.data);
    });
    const blob = new Blob([JSON.stringify(grouped,null,2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='worship-schedules-backup.json'; a.click();
    URL.revokeObjectURL(url); showToast('Backup downloaded ✓');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
